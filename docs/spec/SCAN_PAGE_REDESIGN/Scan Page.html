<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Scan — Clinical Design</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Barlow', sans-serif; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(2200%); } }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  @keyframes ticker { 0% { transform: translateY(0); } 100% { transform: translateY(-100%); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<script type="text/babel">

const THEMES = {
  light: {
    pageBg:"#f5f5f0", surface:"#ffffff", surfaceAlt:"#fafaf8",
    border:"#e8e8e2", borderSoft:"#f0f0ec",
    titleText:"#111111", bodyText:"#333333", metaText:"#888888", dimText:"#aaaaaa",
    accent:"#00b894", accentDim:"rgba(0,184,148,0.08)", accentBorder:"rgba(0,184,148,0.25)",
    amber:"#f5a623", danger:"#e84040",
    cardShadow:"0 1px 4px rgba(0,0,0,0.06)",
    sidebarBg:"#f0f0ea", sidebarText:"#999999", sidebarActive:"#111111", sidebarDivider:"#e0e0d8", sidebarActiveBg:"rgba(0,0,0,0.05)",
    btnBg:"#111111", btnText:"#ffffff",
    btnSecondaryBg:"#ffffff", btnSecondaryText:"#666666", btnSecondaryBorder:"#e0e0d8",
    barTrack:"#e8e8e2", grid:"rgba(0,0,0,0.035)",
    terminalBg:"#0e0f12", terminalText:"#9aa0aa",
  },
  dark: {
    pageBg:"#0a0b0f", surface:"#13141a", surfaceAlt:"#16171c",
    border:"#22242c", borderSoft:"#1a1c22",
    titleText:"#e8eaf2", bodyText:"#c8cad4", metaText:"#6a6d7a", dimText:"#3a3d4a",
    accent:"#00c9a7", accentDim:"rgba(0,201,167,0.08)", accentBorder:"rgba(0,201,167,0.22)",
    amber:"#f5a623", danger:"#e84040",
    cardShadow:"0 1px 6px rgba(0,0,0,0.3)",
    sidebarBg:"#0d0e12", sidebarText:"#3a3d48", sidebarActive:"#e8eaf0", sidebarDivider:"#1a1c22", sidebarActiveBg:"rgba(255,255,255,0.04)",
    btnBg:"#00c9a7", btnText:"#0a1a16",
    btnSecondaryBg:"transparent", btnSecondaryText:"#9a9daa", btnSecondaryBorder:"#2a2d38",
    barTrack:"#22242c", grid:"rgba(255,255,255,0.025)",
    terminalBg:"#06070a", terminalText:"#7a808a",
  },
};

function Sidebar({ t }) {
  const items = ["DUPLICATES","SAME FOLDER","LARGE FILES","OLD FILES","RECENTLY DELETED"];
  return (
    <div style={{ width:180, background:t.sidebarBg, borderRight:`1px solid ${t.sidebarDivider}`, display:"flex", flexDirection:"column", flexShrink:0, height:"100%", opacity: 0.6 }}>
      <div style={{ padding:"20px 18px 16px" }}>
        <div style={{ fontSize:18, fontWeight:900, color:t.accent, fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:"0.02em", lineHeight:1.1, textTransform:"uppercase" }}>Drive<br/>Duplicate<br/>Cleaner</div>
        <div style={{ fontSize:8, color:t.sidebarText, fontWeight:700, letterSpacing:"0.1em", marginTop:4 }}>DRIVE SCANNER V1</div>
      </div>
      <div style={{ borderTop:`1px solid ${t.sidebarDivider}`, padding:"10px 18px" }}>
        <div style={{ fontSize:9, color:t.sidebarText, fontWeight:700, letterSpacing:"0.06em" }}>STORAGE SUMMARY</div>
      </div>
      <div style={{ borderTop:`1px solid ${t.sidebarDivider}`, padding:"8px 0" }}>
        <div style={{ padding:"6px 18px", fontSize:8, color:t.sidebarText, fontWeight:700, letterSpacing:"0.12em" }}>FILES BY CATEGORY</div>
        {items.map(i => (
          <div key={i} style={{ padding:"5px 18px", fontSize:9, fontWeight:500, color:t.sidebarText, letterSpacing:"0.06em", display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ width:5, height:5, borderRadius:3, background:t.dimText }}/> {i}
          </div>
        ))}
      </div>
      <div style={{ flex:1 }}/>
      <div style={{ borderTop:`1px solid ${t.sidebarDivider}`, padding:"12px 18px" }}>
        <div style={{ fontSize:9, color:t.sidebarText, fontWeight:700, letterSpacing:"0.12em" }}>↗ LOG OUT</div>
      </div>
    </div>
  );
}


const TYPE_COL = { mp4:"#e84040", mov:"#e84040", jpg:"#f5a623", png:"#f5a623", pdf:"#f5a623", zip:"#667eea", mp3:"#f5a623", docx:"#4285F4", xlsx:"#00b894", key:"#9b59b6" };

function ScanPage({ themeName }) {
  const t = THEMES[themeName];
  const [progress, setProgress] = React.useState(34);
  const [parsed, setParsed] = React.useState(1565);
  const [matched, setMatched] = React.useState(127);
  const [reclaim, setReclaim] = React.useState(284);
  const [phase] = React.useState(2); // 0..4

  React.useEffect(() => {
    const id = setInterval(() => {
      setProgress(p => p >= 100 ? 100 : p + 0.6);
      setParsed(p => p + Math.floor(Math.random()*8) + 2);
      if (Math.random() > 0.7) setMatched(m => m + 1);
      if (Math.random() > 0.5) setReclaim(r => r + Math.floor(Math.random()*5) + 1);
    }, 320);
    return () => clearInterval(id);
  }, []);

  const phases = [
    { id:0, label:"Connect to Drive", time:"~2s" },
    { id:1, label:"List file metadata", time:"~5s" },
    { id:2, label:"Compute checksums", time:"~30s" },
    { id:3, label:"Find duplicate groups", time:"~5s" },
    { id:4, label:"Prepare results", time:"~1s" },
  ];

  const W = 1100;

  return (
    <div style={{ display:"flex", width:"100%", height:"100%", overflow:"hidden", background:t.pageBg, color:t.bodyText, fontFamily:"'Barlow', sans-serif" }}>
      <Sidebar t={t}/>
      <div style={{ flex:1, overflow:"auto", position:"relative" }}>
        {/* Grid background */}
        <div style={{ position:"absolute", inset:0, backgroundImage:`linear-gradient(${t.grid} 1px, transparent 1px), linear-gradient(90deg, ${t.grid} 1px, transparent 1px)`, backgroundSize:"32px 32px", pointerEvents:"none" }}/>

        {/* Top breadcrumb / header */}
        <div style={{ padding:"24px 36px 18px", borderBottom:`1px solid ${t.border}`, background:t.surface, position:"relative", zIndex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:10, fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:10 }}>
            <span style={{ color:t.metaText }}>Cleanup</span>
            <span style={{ color:t.dimText }}>/</span>
            <span style={{ color:t.accent }}>Scan</span>
          </div>
          <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", gap:20 }}>
            <div>
              <h1 style={{ fontSize:42, fontWeight:900, fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:"-0.01em", textTransform:"uppercase", color:t.titleText, lineHeight:0.95, marginBottom:8, whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:14 }}>
                Drive Scan
                <span style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:11, fontWeight:800, color:t.accent, background:t.accentDim, border:`1px solid ${t.accentBorder}`, padding:"4px 10px", borderRadius:99, letterSpacing:"0.16em", fontFamily:"'Barlow Condensed', sans-serif", lineHeight:1 }}>
                  <span style={{ width:6, height:6, borderRadius:3, background:t.accent, animation:"pulse 1.4s ease-in-out infinite" }}/>
                  LIVE
                </span>
              </h1>
              <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:11, color:t.metaText, fontWeight:600 }}>
                <span style={{ width:8, height:8, borderRadius:4, background:t.accent, animation:"pulse 1.4s ease-in-out infinite" }}/>
                Scanning your Google Drive · Started 14 seconds ago
              </div>
            </div>
            <div style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:t.metaText, textAlign:"right" }}>
              <div>SESSION <span style={{ color:t.bodyText }}>scn_a4f9e2</span></div>
              <div>ETA <span style={{ color:t.accent }}>~22s remaining</span></div>
            </div>
          </div>
        </div>

        <div style={{ padding:"28px 36px 40px", maxWidth:W, margin:"0 auto", position:"relative", zIndex:1, display:"flex", flexDirection:"column", gap:18 }}>

          {/* HERO PROGRESS PANEL */}
          <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:12, boxShadow:t.cardShadow, overflow:"hidden", position:"relative" }}>
            {/* Animated scan-line */}
            <div style={{ position:"absolute", left:0, right:0, top:0, height:1, background:`linear-gradient(90deg, transparent, ${t.accent}, transparent)`, opacity:0.5, animation:"pulse 2s ease-in-out infinite" }}/>
            <div style={{ padding:"32px 36px 30px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:30, alignItems:"end", marginBottom:22 }}>
                <div>
                  <div style={{ fontSize:10, fontWeight:800, color:t.accent, letterSpacing:"0.18em", textTransform:"uppercase", marginBottom:8 }}>Step 3 of 5 · Computing checksums</div>
                  <div style={{ display:"flex", alignItems:"baseline", gap:14 }}>
                    <span style={{ fontSize:96, fontWeight:900, color:t.titleText, fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:"-0.025em", lineHeight:0.85 }}>{Math.floor(progress)}<span style={{ fontSize:48, color:t.metaText }}>%</span></span>
                    <div style={{ paddingBottom:8 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:t.bodyText, marginBottom:2 }}>scanned</div>
                      <div style={{ fontSize:11, color:t.metaText, fontFamily:"'JetBrains Mono', monospace" }}>{parsed.toLocaleString()} of ~4,580 objects</div>
                    </div>
                  </div>
                </div>
                <button style={{ background:t.btnSecondaryBg, color:t.btnSecondaryText, border:`1px solid ${t.btnSecondaryBorder}`, borderRadius:7, padding:"10px 18px", fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", cursor:"pointer", fontFamily:"'Barlow Condensed', sans-serif", display:"flex", alignItems:"center", gap:7 }}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="6" y="6" width="12" height="12"/></svg>
                  Cancel scan
                </button>
              </div>

              {/* Big segmented progress bar */}
              <div style={{ display:"flex", gap:3, height:10, marginBottom:12 }}>
                {Array.from({ length:40 }).map((_, i) => {
                  const segPct = (i / 40) * 100;
                  const filled = segPct < progress;
                  const active = filled && segPct > progress - 6;
                  return <div key={i} style={{ flex:1, background: active ? t.accent : filled ? t.accent : t.barTrack, borderRadius:1, opacity: active ? 1 : filled ? 0.85 : 1, animation: active ? "pulse 1s ease-in-out infinite" : "none" }}/>;
                })}
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, fontFamily:"'JetBrains Mono', monospace", color:t.dimText, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase" }}>
                <span>0</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
              </div>
            </div>

            {/* Phase strip */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(5, 1fr)", borderTop:`1px solid ${t.border}`, background:t.surfaceAlt }}>
              {phases.map((p, i) => {
                const isPast = i < phase;
                const isCurrent = i === phase;
                const c = isCurrent ? t.accent : isPast ? t.bodyText : t.dimText;
                return (
                  <div key={p.id} style={{ padding:"14px 18px", borderRight: i < phases.length-1 ? `1px solid ${t.border}` : "none", display:"flex", flexDirection:"column", gap:4, position:"relative" }}>
                    {isCurrent && <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:t.accent }}/>}
                    <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                      <span style={{ width:18, height:18, borderRadius:9, border:`1.5px solid ${c}`, background: isPast ? c : "transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:800, color: isPast ? t.surface : c, fontFamily:"'JetBrains Mono', monospace" }}>
                        {isPast ? "✓" : isCurrent ? <span style={{ width:6, height:6, borderRadius:3, background:t.accent, animation:"pulse 1s ease-in-out infinite" }}/> : i+1}
                      </span>
                      <span style={{ fontSize:11, fontWeight:700, color:c, letterSpacing:"0.04em", textTransform:"uppercase", fontFamily:"'Barlow Condensed', sans-serif" }}>{p.label}</span>
                    </div>
                    <div style={{ fontSize:9, color:t.metaText, fontFamily:"'JetBrains Mono', monospace", marginLeft:25 }}>{p.time}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* STATS GRID */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:14 }}>
            {[
              { label:"Objects parsed", value:parsed.toLocaleString(), sub:"of ~4,580", color:t.titleText },
              { label:"Matches found", value:matched, sub:`${Math.floor(matched*0.7)} exact · ${Math.floor(matched*0.3)} likely`, color:t.accent },
              { label:"Estimated reclaim", value:`${reclaim} MB`, sub:"so far", color:t.amber },
              { label:"Throughput", value:"142/s", sub:"avg over last 5s", color:t.bodyText },
            ].map((s,i) => (
              <div key={i} style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:10, padding:"18px 20px", boxShadow:t.cardShadow }}>
                <div style={{ fontSize:9, fontWeight:800, color:t.metaText, letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:8 }}>{s.label}</div>
                <div style={{ fontSize:32, fontWeight:900, color:s.color, fontFamily:"'Barlow Condensed', sans-serif", letterSpacing:"-0.01em", lineHeight:1, marginBottom:5 }}>{s.value}</div>
                <div style={{ fontSize:10, color:t.dimText, fontFamily:"'JetBrains Mono', monospace" }}>{s.sub}</div>
              </div>
            ))}
          </div>

          {/* PRIVACY REASSURANCE */}
          <div style={{ background:t.accentDim, border:`1px solid ${t.accentBorder}`, borderRadius:8, padding:"12px 18px", display:"flex", alignItems:"center", gap:14 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={t.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0 }}>
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:700, color:t.accent, letterSpacing:"0.04em" }}>Your files never leave your browser.</div>
              <div style={{ fontSize:11, color:t.bodyText, marginTop:1 }}>The scan runs locally. We compute checksums in your browser and send nothing to a server. You can close this tab anytime — there's nothing to clean up.</div>
            </div>
            <span style={{ fontSize:9, color:t.metaText, fontFamily:"'JetBrains Mono', monospace", letterSpacing:"0.1em" }}>0 BYTES SENT</span>
          </div>

          {/* FOOTER TIPS */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:14 }}>
            {[
              ["Safe to leave", "The scan continues if you switch tabs. Come back any time."],
              ["Resumable", "If the connection drops, the scan picks up from the last hashed file."],
              ["No deletions yet", "Nothing is modified during the scan. Reviewing comes next."],
            ].map(([t1, t2], i) => (
              <div key={i} style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:8, padding:"12px 16px" }}>
                <div style={{ fontSize:11, fontWeight:700, color:t.titleText, marginBottom:3, letterSpacing:"0.02em" }}>{t1}</div>
                <div style={{ fontSize:11, color:t.metaText, lineHeight:1.5 }}>{t2}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="scan" title="Drive Scan — Clinical">
        <DCArtboard id="light" label="Light Theme" width={1280} height={1100}>
          <ScanPage themeName="light"/>
        </DCArtboard>
        <DCArtboard id="dark" label="Dark Theme" width={1280} height={1100}>
          <ScanPage themeName="dark"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
